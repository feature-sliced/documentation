<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="100%" height="100%">
  <style>
    .font-base { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #000; }
    .font-red { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #a10000; }
    .tree-line { stroke: #888; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .strike-line { stroke: #a10000; stroke-width: 2.5; stroke-linecap: round; }
    .arrow { stroke: #a10000; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <defs>
    <g id="folder">
